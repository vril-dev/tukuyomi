name: ci

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  go-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache-dependency-path: server/go.sum
      - name: Run unit tests
        run: go test ./...

  mysql-logstore-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache-dependency-path: server/go.sum

      - name: Prepare env file
        run: cp .env.example .env

      - name: Start MySQL container
        run: docker compose --profile mysql up -d mysql

      - name: Wait for MySQL healthy
        run: |
          for i in $(seq 1 60); do
            if docker compose --profile mysql exec -T mysql mysqladmin ping -h 127.0.0.1 -uroot -p"${MYSQL_ROOT_PASSWORD:-tukuyomi-root}" --silent >/dev/null 2>&1; then
              echo "mysql is ready"
              exit 0
            fi
            sleep 2
          done
          echo "mysql did not become healthy in time" >&2
          docker compose --profile mysql ps mysql || true
          docker compose --profile mysql logs mysql || true
          exit 1

      - name: Run MySQL log-store integration test
        working-directory: server
        env:
          WAF_TEST_MYSQL_DSN: tukuyomi:tukuyomi@tcp(127.0.0.1:13306)/tukuyomi?charset=utf8mb4&parseTime=true
        run: go test ./internal/handler -run TestLogsStatsMySQLStoreAggregatesAndIngestsIncrementally -count=1

      - name: Tear down MySQL container
        if: always()
        run: docker compose --profile mysql down -v

  ui-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/tukuyomi-admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/tukuyomi-admin/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run UI tests
        run: npm test
      - name: Run UI build
        run: npm run build

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose and preset baseline
        run: make compose-config compose-config-mysql preset-check-minimal

  waf-test:
    name: waf-test (sqlite)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache-dependency-path: server/go.sum

      - name: Prepare env file
        run: cp .env.example .env

      - name: Install CRS
        run: ./scripts/install_crs.sh

      - name: Configure app config for SQLite
        run: |
          set -euo pipefail
          tmp="$(mktemp)"
          jq '
            .server.listen_addr = ":9090" |
            .storage.db_driver = "sqlite" |
            .storage.db_retention_days = 30 |
            .admin = (.admin // {}) |
            .admin.session_secret = "ci-session-secret-1-1-0-release"
          ' data/conf/config.json > "${tmp}"
          mv "${tmp}" data/conf/config.json

          # Keep the baseline upstream unreachable; route/admin smoke injects its
          # own reachable upstream later, while GoTestWAF keeps historical scoring.
          tmp_proxy="$(mktemp)"
          mkdir -p data/conf
          jq '
            .upstreams = [
              {
                "name": "ci-unreachable",
                "url": "http://127.0.0.1:9081",
                "weight": 1,
                "enabled": true
              }
            ]
          ' seeds/conf/proxy.json > "${tmp_proxy}"
          mv "${tmp_proxy}" data/conf/proxy.json

      - name: Import startup config and WAF assets into DB
        run: |
          make db-import
          make crs-install

      - name: Coraza smoke check
        env:
          WAF_LISTEN_PORT: "9090"
          WAF_API_KEY_PRIMARY: "dev-only-change-this-key-please"
          TUKUYOMI_ADMIN_BOOTSTRAP_USERNAME: "admin"
          TUKUYOMI_ADMIN_BOOTSTRAP_PASSWORD: "dev-only-change-this-password-please"
          TUKUYOMI_ADMIN_BOOTSTRAP_EMAIL: "admin@example.test"
        run: |
          set -euo pipefail
          cleanup() {
            if [[ -n "${UPSTREAM_PID:-}" ]] && kill -0 "${UPSTREAM_PID}" >/dev/null 2>&1; then
              kill "${UPSTREAM_PID}" >/dev/null 2>&1 || true
              wait "${UPSTREAM_PID}" >/dev/null 2>&1 || true
            fi
            PUID="$(id -u)" GUID="$(id -g)" CORAZA_PORT=19090 docker compose down --remove-orphans >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          python3 ./scripts/proxy_echo_server.py 18080 >/tmp/proxy_echo.log 2>&1 &
          UPSTREAM_PID=$!

          PUID="$(id -u)" \
          GUID="$(id -g)" \
          CORAZA_PORT=19090 \
          docker compose up -d --build coraza

          for i in $(seq 1 60); do
            code="$(curl -sS -o /dev/null -w "%{http_code}" "http://localhost:19090/healthz" || true)"
            if [[ "${code}" == "200" ]]; then
              break
            fi
            sleep 1
          done

          code="$(curl -sS -o /dev/null -w "%{http_code}" "http://localhost:19090/healthz" || true)"
          if [[ "${code}" != "200" ]]; then
            echo "coraza health check failed: ${code}" >&2
            docker compose ps coraza || true
            docker compose logs --tail=120 coraza || true
            exit 1
          fi

          attack_code="$(curl -sS -o /dev/null -w "%{http_code}" "http://localhost:19090/?q=<script>alert(1)</script>" || true)"
          if [[ "${attack_code}" != "403" ]]; then
            echo "expected 403 for basic XSS probe, got ${attack_code}" >&2
            docker compose logs --tail=120 coraza || true
            exit 1
          fi

          HOST_CORAZA_PORT=19090 \
          PROXY_ECHO_PORT=18080 \
          PROXY_ECHO_URL="http://host.docker.internal:18080" \
          ./scripts/ci_proxy_admin_smoke.sh

      - name: Run GoTestWAF
        env:
          GOTESTWAF_AUTO_DOWN: "1"
          MIN_BLOCKED_RATIO: "70"
          WAF_LISTEN_PORT: "9090"
        run: ./scripts/run_gotestwaf.sh

      - name: Validate SQLite DB artifact
        run: |
          if [[ ! -s data/db/tukuyomi.db ]]; then
            echo "expected sqlite db file was not generated" >&2
            ls -la data/db || true
            exit 1
          fi

      - name: Publish GoTestWAF summary
        if: always()
        run: |
          if [[ -f data/tmp/gotestwaf/gotestwaf-report-summary.md ]]; then
            cat data/tmp/gotestwaf/gotestwaf-report-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload GoTestWAF artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gotestwaf-report-sqlite
          path: |
            data/tmp/gotestwaf/gotestwaf-report.json
            data/tmp/gotestwaf/gotestwaf-report-summary.txt
            data/tmp/gotestwaf/gotestwaf-report-summary.md
            data/db/tukuyomi.db
          if-no-files-found: warn
