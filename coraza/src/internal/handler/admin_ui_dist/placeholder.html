<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>tukuyomi admin UI placeholder</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(160deg, #f5efe2, #dfe8ef);
        color: #1f2d3d;
      }
      main {
        width: min(42rem, calc(100vw - 2rem));
        padding: 2rem;
        border-radius: 1rem;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 16px 50px rgba(31, 45, 61, 0.12);
      }
      h1 {
        margin-top: 0;
      }
      code {
        font-family: "IBM Plex Mono", "SFMono-Regular", monospace;
        font-size: 0.95em;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Embedded admin UI not built</h1>
      <p>
        This binary was built without the compiled React admin UI. Run
        <code>make ui-build-sync</code> or <code>make build</code> before packaging
        <code>tukuyomi</code>.
      </p>
      <p>
        The placeholder is kept in git so <code>go build</code> and Docker builds
        still embed a valid page on fresh checkouts.
      </p>
    </main>
  </body>
</html>
