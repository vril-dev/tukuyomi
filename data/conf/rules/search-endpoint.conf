# Sample standalone override rule file for a noisy search endpoint.
#
# Reference this file from `waf-bypass.json` via:
#   { "path": "/search", "extra_rule": "conf/rules/search-endpoint.conf" }
#
# This file is not merged into the base WAF rule set. It is loaded only when a
# bypass rule references it.

SecRuleEngine On

SecRule ARGS:q "@rx (?i)(<script|union([[:space:]]+all)?[[:space:]]+select|benchmark\s*\(|sleep\s*\()" \
  "id:100001,phase:2,deny,status:403,log,msg:'suspicious search query'"
