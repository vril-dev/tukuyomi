services:    
  mysql:
    image: mysql:8.4
    profiles: ["mysql"]
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE:-tukuyomi}
      - MYSQL_USER=${MYSQL_USER:-tukuyomi}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-tukuyomi}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-tukuyomi-root}
      - TZ=${MYSQL_TZ:-UTC}
    ports:
      - "${MYSQL_PORT:-13306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    restart: unless-stopped
  coraza:
    user: "${PUID}:${GUID}"
    build:
      context: ./server
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-}
    environment:
      - WAF_CONFIG_FILE=${WAF_CONFIG_FILE:-conf/config.json}
      - WAF_STORAGE_DB_DRIVER=${WAF_STORAGE_DB_DRIVER:-}
      - WAF_STORAGE_DB_DSN=${WAF_STORAGE_DB_DSN:-}
      - WAF_STORAGE_DB_PATH=${WAF_STORAGE_DB_PATH:-data/db/tukuyomi.db}
      - WAF_STORAGE_DB_RETENTION_DAYS=${WAF_STORAGE_DB_RETENTION_DAYS:-}
      - WAF_STORAGE_DB_SYNC_INTERVAL_SEC=${WAF_STORAGE_DB_SYNC_INTERVAL_SEC:-}
      - TUKUYOMI_ADMIN_BOOTSTRAP_USERNAME=${TUKUYOMI_ADMIN_BOOTSTRAP_USERNAME:-}
      - TUKUYOMI_ADMIN_BOOTSTRAP_PASSWORD=${TUKUYOMI_ADMIN_BOOTSTRAP_PASSWORD:-}
      - TUKUYOMI_ADMIN_BOOTSTRAP_EMAIL=${TUKUYOMI_ADMIN_BOOTSTRAP_EMAIL:-}
      - TUKUYOMI_PPROF_ADDR=${TUKUYOMI_PPROF_ADDR:-}
    volumes:
      - ./data:/app/data
      - ./data/cache:/app/cache
      - ./data/conf:/app/conf
      - ./data/scheduled-tasks:/app/data/scheduled-tasks
      - ./data/php-fpm:/app/data/php-fpm
      - ./data/vhosts:/app/data/vhosts
      - ./scripts:/app/scripts:ro
      - ./build:/app/build:ro
    ports:
      - "${CORAZA_PORT:-9090}:${WAF_LISTEN_PORT:-9090}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -T 2 -O /dev/null http://127.0.0.1:${WAF_HEALTHCHECK_PORT:-9090}/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped
  scheduled-task-runner:
    user: "${PUID}:${GUID}"
    profiles: ["scheduled-tasks"]
    build:
      context: ./server
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-}
    environment:
      - WAF_CONFIG_FILE=${WAF_CONFIG_FILE:-conf/config.json}
      - WAF_STORAGE_DB_DRIVER=${WAF_STORAGE_DB_DRIVER:-}
      - WAF_STORAGE_DB_DSN=${WAF_STORAGE_DB_DSN:-}
      - WAF_STORAGE_DB_PATH=${WAF_STORAGE_DB_PATH:-data/db/tukuyomi.db}
      - WAF_STORAGE_DB_RETENTION_DAYS=${WAF_STORAGE_DB_RETENTION_DAYS:-}
      - WAF_STORAGE_DB_SYNC_INTERVAL_SEC=${WAF_STORAGE_DB_SYNC_INTERVAL_SEC:-}
      - TUKUYOMI_ADMIN_BOOTSTRAP_USERNAME=${TUKUYOMI_ADMIN_BOOTSTRAP_USERNAME:-}
      - TUKUYOMI_ADMIN_BOOTSTRAP_PASSWORD=${TUKUYOMI_ADMIN_BOOTSTRAP_PASSWORD:-}
      - TUKUYOMI_ADMIN_BOOTSTRAP_EMAIL=${TUKUYOMI_ADMIN_BOOTSTRAP_EMAIL:-}
    volumes:
      - ./data:/app/data
      - ./data/cache:/app/cache
      - ./data/conf:/app/conf
      - ./data/scheduled-tasks:/app/data/scheduled-tasks
      - ./data/php-fpm:/app/data/php-fpm
      - ./data/vhosts:/app/data/vhosts
    command:
      - /bin/sh
      - -lc
      - |
        set -eu
        echo "[scheduled-task-runner] starting one-shot loop"
        while :; do
          if /app/server run-scheduled-tasks; then
            :
          else
            code="$$?"
            echo "[scheduled-task-runner][fatal] run-scheduled-tasks failed; exiting for restart" >&2
            exit "$$code"
          fi
          now="$$(date +%s)"
          sleep_for=$$((60 - ($$now % 60)))
          sleep "$$sleep_for"
        done
    restart: unless-stopped
  gotestwaf:
    image: wallarm/gotestwaf:0.5.8@sha256:ff7184da90029a98c87bfdbadcee544c979b999593175d17b2d38f642ee29977
    user: "${PUID}:${GUID}"
    profiles: ["waf-test"]
    depends_on:
      coraza:
        condition: service_healthy
    command:
      - --url=${GOTESTWAF_TARGET_URL:-http://coraza:${WAF_LISTEN_PORT:-9090}}
      - --wafName=tukuyomi
      - --reportFormat=json
      - --reportPath=/app/reports
      - --reportName=gotestwaf-report
      - --noEmailReport
    volumes:
      - ./data/tmp/gotestwaf:/app/reports
    restart: "no"

volumes:
  mysql_data:
