        '500':
          $ref: '#/components/responses/InternalError'

  /tukuyomi-api/logs/security-audit/verify:
    get:
      tags: [logs]
      summary: Verify chained HMAC integrity for the retained security audit stream
      responses:
        '200':
          description: Verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdditionalPropertiesObject'

  /tukuyomi-api/logs/security-audit/evidence/{capture_id}/metadata:
    get:
      tags: [logs]
      summary: Read encrypted evidence metadata without exposing raw request payloads
      parameters:
        - name: capture_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Evidence metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdditionalPropertiesObject'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Capture metadata not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdditionalPropertiesObject'
        '500':
          $ref: '#/components/responses/InternalError'

