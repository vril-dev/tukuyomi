      summary: Validate or apply a scoped false-positive tuning rule
      parameters:
        - $ref: '#/components/parameters/IfMatchHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FPTunerApplyRequest'
      responses:
        '200':
          description: Proposal applied or simulated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdditionalPropertiesObject'
        '400':
