openapi: 3.0.3
info:
  title: tukuyomi Admin API
  version: 1.0.0
  description: |
    OpenAPI document for the admin endpoints exposed by tukuyomi.

    The default admin API base path is `/tukuyomi-api`. It can be changed by configuration,
    so treat these paths as the default contract.
servers:
  - url: /
security: &AdminReadSecurity
  - ApiKeyAuth: []
  - AdminSessionCookie: []
x-admin-write-security: &AdminWriteSecurity
  - ApiKeyAuth: []
  - AdminSessionCookie: []
    AdminCSRFCookie: []
    AdminCSRFHeader: []
tags:
  - name: auth
  - name: discovery
  - name: status
  - name: logs
  - name: waf
  - name: crs
  - name: bypass
  - name: cache
  - name: country-block
  - name: rate-limit
  - name: notifications
  - name: ip-reputation
  - name: bot-defense
  - name: semantic
  - name: proxy-routing
  - name: backends
  - name: sites
  - name: verify
  - name: fp-tuner
paths:
  /tukuyomi-api/:
    get:
      tags: [discovery]
      summary: Get API discovery metadata
      responses:
        '200':
          description: Endpoint listing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RootDiscoveryResponse'

  /tukuyomi-api/auth/session:
    get:
      tags: [auth]
      summary: Inspect current browser admin session state
      description: |
        Returns the current browser session state. This endpoint is intentionally callable
        without prior authentication so the embedded admin UI can detect whether login is
        required. When a valid session cookie is present, the response includes the current
        expiry and CSRF header/cookie names.
      security: []
      responses:
        '200':
          description: Session state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSessionStateResponse'

  /tukuyomi-api/auth/login:
    post:
      tags: [auth]
      summary: Exchange an admin API key for a signed browser session
      description: |
        This endpoint accepts an admin API key in the JSON body and sets
        `tukuyomi_admin_session` and `tukuyomi_admin_csrf` cookies for the browser.
        Use this for interactive UI sign-in. CLI and automation clients may continue to
        call protected endpoints directly with `X-API-Key`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLoginRequest'
      responses:
        '200':
          description: Admin session issued
          headers:
            Set-Cookie:
              description: Sets `tukuyomi_admin_session` and `tukuyomi_admin_csrf` cookies.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminLoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /tukuyomi-api/auth/logout:
    post:
      tags: [auth]
      summary: Clear the current browser admin session
      description: |
        Browser callers should send the current session cookie plus the matching
        `X-CSRF-Token` header. API-key callers may also use this endpoint to clear cookies
        in a deterministic way during smoke tests.
      security: *AdminWriteSecurity
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
      responses:
        '200':
          description: Admin session cleared
          headers:
            Set-Cookie:
              description: Clears `tukuyomi_admin_session` and `tukuyomi_admin_csrf` cookies.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '403':
          $ref: '#/components/responses/Forbidden'

  /tukuyomi-api/status:
    get:
      tags: [status]
      summary: Get runtime status and effective configuration snapshot
      responses:
        '200':
          description: Status snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'

  /tukuyomi-api/metrics:
    get:
      tags: [status]
      summary: Export Prometheus-style runtime metrics
      responses:
        '200':
          description: Prometheus exposition format
          content:
            text/plain:
              schema:
                type: string

  /tukuyomi-api/verify-manifest:
    get:
      tags: [verify]
      summary: Export a verification manifest scaffold for external WAF test runners
      responses:
        '200':
          description: Verification manifest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyManifestResponse'

  /tukuyomi-api/logs/read:
    get:
      tags: [logs]
      summary: Read log entries with cursor-based pagination
      parameters:
        - $ref: '#/components/parameters/LogSource'
        - $ref: '#/components/parameters/TailQuery'
        - $ref: '#/components/parameters/DirQuery'
        - $ref: '#/components/parameters/CursorQuery'
        - $ref: '#/components/parameters/CountryQuery'
      responses:
        '200':
          description: Log page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogsReadResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /tukuyomi-api/logs/security-audit:
    get:
      tags: [logs]
      summary: Read signed request-level security audit entries by req_id
      parameters:
        - name: req_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Security audit entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdditionalPropertiesObject'
        '400':
