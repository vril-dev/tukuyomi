        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '500':
          $ref: '#/components/responses/InternalError'
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  parameters:
    IfMatchHeader:
      name: If-Match
      in: header
      required: false
      description: Optimistic concurrency token returned as `etag` from a prior GET.
      schema:
        type: string
    WebLogSource:
      name: src
      in: query
      required: true
      schema:
        type: string
        enum: [waf, accerr, intr]
    TailQuery:
      name: tail
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    DirQuery:
      name: dir
      in: query
      required: false
      schema:
        type: string
        enum: [prev]
    CursorQuery:
      name: cursor
      in: query
      required: false
      schema:
        type: integer
        format: int64
    CountryQuery:
      name: country
      in: query
      required: false
      schema:
        type: string
    HoursQuery:
      name: hours
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    ScanQuery:
      name: scan
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    FromQuery:
      name: from
      in: query
      required: false
      description: RFC3339 timestamp.
      schema:
        type: string
        format: date-time
    ToQuery:
      name: to
      in: query
      required: false
      description: RFC3339 timestamp.
      schema:
        type: string
        format: date-time
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Optimistic concurrency conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ConflictResponse'
    Unprocessable:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationResult'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    AdditionalPropertiesObject:
      type: object
      additionalProperties: true
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      additionalProperties: true
    ConflictResponse:
      type: object
      properties:
        error:
          type: string
        currentETag:
          type: string
      additionalProperties: true
    ValidationResult:
      type: object
      properties:
        ok:
          type: boolean
        messages:
          type: array
          items:
            type: string
      additionalProperties: true
    UpdateResult:
      type: object
      properties:
        ok:
          type: boolean
        etag:
          type: string
      additionalProperties: true
    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
      required: [ok]
      additionalProperties: true
    StatusResponse:
      type: object
      additionalProperties: true
      description: |
        Runtime status object. Includes top-level fields such as `status`, configured file paths,
        rate-limit state, notification counters, IP reputation state, semantic counters, DB state,
        and the effective admin API base path.
    RulesFilesResponse:
      type: object
      properties:
        rules:
          type: object
          additionalProperties:
            type: string
        files:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
              raw:
                type: string
              etag:
                type: string
              error:
                type: string
            additionalProperties: true
      additionalProperties: true
    GenericConfigResponse:
      type: object
      properties:
        etag:
          type: string
        raw:
          type: string
      additionalProperties: true
    LogsReadResponse:
      type: object
      properties:
        lines:
          type: array
