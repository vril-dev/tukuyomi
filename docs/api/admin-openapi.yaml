openapi: 3.0.3
info:
  title: tukuyomi Admin API
  version: 1.0.0
  description: |
    OpenAPI document for the admin endpoints exposed by tukuyomi.

    The default admin API base path is `/tukuyomi-api`. It can be changed by configuration,
    so treat these paths as the default contract.
servers:
  - url: /
security:
  - ApiKeyAuth: []
tags:
  - name: status
  - name: logs
  - name: waf
  - name: crs
  - name: bypass
  - name: cache
  - name: country-block
  - name: rate-limit
  - name: notifications
  - name: ip-reputation
  - name: bot-defense
  - name: semantic
  - name: verify
  - name: fp-tuner
paths:
  /tukuyomi-api/status:
    get:
      tags: [status]
      summary: Get runtime status and effective configuration snapshot
      responses:
        '200':
          description: Status snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'

  /tukuyomi-api/metrics:
    get:
      tags: [status]
      summary: Export Prometheus-style runtime metrics
      responses:
        '200':
          description: Prometheus exposition format
          content:
            text/plain:
              schema:
                type: string

  /tukuyomi-api/verify-manifest:
    get:
      tags: [verify]
      summary: Export a verification manifest scaffold for external WAF test runners
      responses:
        '200':
          description: Verification manifest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyManifestResponse'

  /tukuyomi-api/logs/read:
    get:
      tags: [logs]
      summary: Read log entries with cursor-based pagination
      parameters:
        - $ref: '#/components/parameters/WebLogSource'
        - $ref: '#/components/parameters/TailQuery'
        - $ref: '#/components/parameters/DirQuery'
        - $ref: '#/components/parameters/CursorQuery'
        - $ref: '#/components/parameters/CountryQuery'
      responses:
        '200':
          description: Log page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogsReadResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /tukuyomi-api/logs/stats:
    get:
      tags: [logs]
      summary: Get WAF block summary and hourly series
      parameters:
        - $ref: '#/components/parameters/HoursQuery'
        - $ref: '#/components/parameters/ScanQuery'
      responses:
        '200':
          description: Log statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogsStatsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /tukuyomi-api/logs/download:
    get:
      tags: [logs]
      summary: Download matching log lines as gzipped NDJSON
      description: |
        Response body is NDJSON and the implementation sets `Content-Encoding: gzip`.
      parameters:
        - $ref: '#/components/parameters/WebLogSource'
        - $ref: '#/components/parameters/FromQuery'
        - $ref: '#/components/parameters/ToQuery'
        - $ref: '#/components/parameters/CountryQuery'
      responses:
        '200':
          description: Gzipped NDJSON stream
          content:
            application/x-ndjson:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequest'

  /tukuyomi-api/rules:
    get:
      tags: [waf]
      summary: Get active editable WAF rule files
      responses:
        '200':
          description: Rule file map plus per-file details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RulesFilesResponse'
    put:
      tags: [waf]
      summary: Save one editable WAF rule file and hot-reload
      parameters:
        - $ref: '#/components/parameters/IfMatchHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuleFilePutRequest'
      responses:
        '200':
          description: Updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '500':
          $ref: '#/components/responses/InternalError'

  /tukuyomi-api/rules:validate:
    post:
      tags: [waf]
      summary: Validate one editable WAF rule file without saving
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuleFilePutRequest'
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/Unprocessable'

  /tukuyomi-api/crs-rule-sets:
