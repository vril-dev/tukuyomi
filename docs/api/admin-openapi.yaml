              schema:
                $ref: '#/components/schemas/AdditionalPropertiesObject'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '500':
          $ref: '#/components/responses/InternalError'
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    AdminSessionCookie:
      type: apiKey
      in: cookie
      name: tukuyomi_admin_session
      description: Signed browser admin session cookie issued by `/tukuyomi-api/auth/login`.
    AdminCSRFCookie:
      type: apiKey
      in: cookie
      name: tukuyomi_admin_csrf
      description: CSRF cookie paired with `tukuyomi_admin_session`.
    AdminCSRFHeader:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: CSRF header required for cookie-authenticated non-safe requests.
  parameters:
    IfMatchHeader:
      name: If-Match
      in: header
      required: false
      schema:
        type: string
    IfMatchRequiredHeader:
      name: If-Match
      in: header
      required: true
      schema:
        type: string
    BackendKeyPath:
      name: backend_key
      in: path
      required: true
      schema:
        type: string
    LogSource:
      name: src
      in: query
      required: true
      schema:
        type: string
        enum: [waf]
    TailQuery:
      name: tail
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    DirQuery:
      name: dir
      in: query
      required: false
      schema:
        type: string
        enum: [prev]
    CursorQuery:
      name: cursor
      in: query
      required: false
      schema:
        type: integer
        format: int64
    CountryQuery:
      name: country
      in: query
      required: false
      schema:
        type: string
    HoursQuery:
      name: hours
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    ScanQuery:
      name: scan
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    FromQuery:
      name: from
      in: query
      required: false
      schema:
        type: string
        format: date-time
    ToQuery:
      name: to
      in: query
      required: false
      schema:
        type: string
        format: date-time
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication required or provided credentials are invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Request was authenticated but failed CSRF validation or a similar guard
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Optimistic concurrency conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ConflictResponse'
    PreconditionRequired:
      description: Required precondition header is missing
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unprocessable:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationResult'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    AdditionalPropertiesObject:
      type: object
      additionalProperties: true
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      additionalProperties: true
    ConflictResponse:
      type: object
      properties:
        error:
          type: string
        currentETag:
          type: string
      additionalProperties: true
    ValidationResult:
      type: object
      properties:
        ok:
          type: boolean
        messages:
          type: array
          items:
            type: string
      additionalProperties: true
    UpdateResult:
      type: object
      properties:
        ok:
          type: boolean
        etag:
          type: string
      additionalProperties: true
    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
      required: [ok]
    AdminLoginRequest:
      type: object
      properties:
        api_key:
          type: string
      required: [api_key]
      additionalProperties: false
    AdminLoginResponse:
      type: object
      properties:
        ok:
          type: boolean
        authenticated:
          type: boolean
        mode:
          type: string
          enum: [session, disabled]
        expires_at:
          type: string
          format: date-time
        csrf_cookie_name:
          type: string
        csrf_header_name:
          type: string
      additionalProperties: true
    AdminSessionStateResponse:
      type: object
      properties:
        authenticated:
          type: boolean
        mode:
          type: string
          enum: [none, session, disabled]
        expires_at:
          type: string
          format: date-time
        csrf_cookie_name:
          type: string
        csrf_header_name:
          type: string
        session_cookie:
          type: string
        session_ttl_secs:
          type: integer
        same_origin_only:
          type: boolean
        cookie_secure_now:
          type: boolean
      additionalProperties: true
    RootDiscoveryResponse:
      type: object
      properties:
        message:
          type: string
        endpoints:
          type: array
          items:
            type: string
      additionalProperties: true
    StatusResponse:
      type: object
      additionalProperties: true
      description: |
        Runtime status object. Includes WAF state, proxy routing and health state, TLS/ACME
        state, optional client-facing HTTP/3 advertisement state, notification counters,
        IP reputation state, semantic counters, cache-store stats, client-facing response
        compression state, and DB storage metadata.
    RulesFilesResponse:
      type: object
      properties:
        rules:
          type: object
          additionalProperties:
            type: string
        files:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
              raw:
                type: string
              etag:
                type: string
              error:
                type: string
            additionalProperties: true
      additionalProperties: true
    GenericConfigResponse:
      type: object
      properties:
        etag:
          type: string
        raw:
          type: string
      additionalProperties: true
    ProxyBackendStatus:
      type: object
      properties:
        key:
          type: string
        name:
          type: string
        url:
          type: string
        provider_class:
          type: string
          enum: [direct, vhost_managed]
        managed_by_vhost:
          type: string
        runtime_ops_supported:
          type: boolean
        http2_mode:
          type: string
        admin_state:
          type: string
          enum: [enabled, draining, disabled]
        health_state:
          type: string
          enum: [unknown, healthy, unhealthy]
        configured_weight:
          type: integer
        weight_override:
          type: integer
        effective_weight:
          type: integer
        effective_selectable:
          type: boolean
        enabled:
          type: boolean
        healthy:
          type: boolean
        inflight:
          type: integer
        passive_failures:
          type: integer
        circuit_state:
          type: string
        circuit_opened_at:
          type: string
          format: date-time
        circuit_reopen_at:
          type: string
          format: date-time
        endpoint:
          type: string
        checked_at:
          type: string
          format: date-time
        last_success_at:
          type: string
          format: date-time
        last_failure_at:
          type: string
          format: date-time
        consecutive_failures:
          type: integer
        last_error:
          type: string
        last_status_code:
          type: integer
        last_latency_ms:
          type: integer
          format: int64
      additionalProperties: true
    ProxyBackendsResponse:
      type: object
      properties:
        path:
          type: string
        etag:
          type: string
        strategy:
          type: string
        updated_at:
          type: string
          format: date-time
        backends:
          type: array
          items:
            $ref: '#/components/schemas/ProxyBackendStatus'
      additionalProperties: true
    ProxyBackendRuntimeOverrideRequest:
      type: object
      properties:
        admin_state:
          type: string
          enum: [enabled, draining, disabled]
        weight_override:
          type: integer
          minimum: 1
      additionalProperties: false
    LogsReadResponse:
      type: object
      properties:
        lines:
          type: array
          items:
            type: object
            additionalProperties: true
        next_cursor:
          type: integer
          format: int64
        page_start:
          type: integer
          format: int64
        page_end:
          type: integer
          format: int64
        has_more:
          type: boolean
        has_prev:
          type: boolean
        has_next:
          type: boolean
      additionalProperties: true
    LogsStatsResponse:
      type: object
      additionalProperties: true
    VerifyManifestResponse:
      type: object
      description: |
        Manifest for external verification tools. Includes WAF, security, bot-defense,
        canonical routes, routing summaries, bypass/cache metadata, and derived
        `normal_flows` / `attack_expectations` with route and execution hints.
      properties:
        schema_version:
          type: string
        product:
          type: string
        generated_at:
          type: string
          format: date-time
        base_url:
          type: string
        api_base_path:
          type: string
        config_hash:
          type: string
        component_hashes:
          $ref: '#/components/schemas/VerifyManifestComponentHashes'
        waf:
          type: object
          additionalProperties: true
        security:
          type: object
          additionalProperties: true
        country_block:
          type: object
          additionalProperties: true
        rate_limit:
          type: object
          additionalProperties: true
        ip_reputation:
          type: object
          additionalProperties: true
        semantic:
          type: object
          additionalProperties: true
        bot_defense:
          type: object
          additionalProperties: true
        routes:
          type: array
          items:
            $ref: '#/components/schemas/VerifyManifestRoute'
        routing:
          type: object
          additionalProperties: true
        bypass_rules:
          type: array
          items:
            type: object
            additionalProperties: true
        cache_rules:
          type: array
          items:
            type: object
            additionalProperties: true
        normal_flows:
          type: array
          items:
            $ref: '#/components/schemas/VerifyManifestExpectedFlow'
        attack_expectations:
          type: array
          items:
            $ref: '#/components/schemas/VerifyManifestAttackExpectation'
      additionalProperties: true
    VerifyManifestComponentHashes:
      type: object
      properties:
        waf: { type: string }
        security: { type: string }
        country_block: { type: string }
        rate_limit: { type: string }
        ip_reputation: { type: string }
        semantic: { type: string }
        bot_defense: { type: string }
        routes: { type: string }
        routing: { type: string }
        bypass_rules: { type: string }
        cache_rules: { type: string }
        normal_flows: { type: string }
        attack_expectations: { type: string }
      additionalProperties: true
    VerifyManifestRoute:
      type: object
      properties:
        name:
          type: string
        route_hash:
          type: string
        host:
          type: string
        match_type:
          type: string
        match_value:
          type: string
        path_prefix:
          type: string
        upstream:
          type: string
        canary_upstream:
          type: string
        canary_weight_percent:
          type: integer
        hash_policy:
          type: string
        hash_key:
          type: string
        waf_mode:
          type: string
        bypass:
          type: boolean
        bypass_modes:
          type: array
          items:
            type: string
        cache:
          type: object
          additionalProperties: true
        rate_limit:
          type: object
          additionalProperties: true
        bot_defense:
          type: object
          additionalProperties: true
        security:
          type: object
          additionalProperties: true
      additionalProperties: true
    VerifyManifestScenarioRequest:
      type: object
      properties:
        query:
          type: object
          additionalProperties:
            type: string
        headers:
          type: object
          additionalProperties:
            type: string
        cookies:
          type: object
          additionalProperties:
            type: string
        form:
          type: object
          additionalProperties:
            type: string
        json:
