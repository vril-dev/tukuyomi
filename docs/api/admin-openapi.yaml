  /tukuyomi-api/rules:
    get:
      tags: [waf]
      summary: Get active editable WAF rule assets
      responses:
        '200':
          description: Rule asset map plus per-asset details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RulesFilesResponse'
    put:
      tags: [waf]
      summary: Save one editable WAF rule file and hot-reload
      security: *AdminWriteSecurity
      parameters:
        - $ref: '#/components/parameters/IfMatchHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuleFilePutRequest'
      responses:
        '200':
          description: Updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '500':
          $ref: '#/components/responses/InternalError'

  /tukuyomi-api/rules:validate:
