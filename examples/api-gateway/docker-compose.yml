services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped

  coraza:
    user: "${PUID}:${GUID}"
    build:
      context: ../../coraza
      dockerfile: Dockerfile
    environment:
      - WAF_CONFIG_FILE=${WAF_CONFIG_FILE:-conf/config.json}
    volumes:
      - ./data/rules:/app/rules
      - ./data/conf:/app/conf
      - ./data/logs:/app/logs
    ports:
      - "${CORAZA_PORT:-19093}:${WAF_LISTEN_PORT:-9090}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -T 2 -O /dev/null http://127.0.0.1:${WAF_LISTEN_PORT:-9090}/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    depends_on:
      - api
    restart: unless-stopped
