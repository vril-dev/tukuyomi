services:
  nextjs:
    build:
      context: ./app
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=development
    restart: unless-stopped

  coraza:
    user: "${PUID}:${GUID}"
    build:
      context: ../../coraza
      dockerfile: Dockerfile
    environment:
      - WAF_CONFIG_FILE=${WAF_CONFIG_FILE:-conf/config.json}
    volumes:
      - ./data/db:/app/db
      - ./data/audit:/app/audit
      - ./data/cache:/app/cache
      - ./data/php-fpm:/app/data/php-fpm
      - ./data/conf:/app/conf
      - ./data/logs:/app/logs
    ports:
      - "${CORAZA_PORT:-19091}:${WAF_LISTEN_PORT:-9090}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -T 2 -O /dev/null http://127.0.0.1:${WAF_LISTEN_PORT:-9090}/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    depends_on:
      - nextjs
    restart: unless-stopped
