services:
  coraza:
    user: "${PUID}:${GUID}"
    build:
      context: ../../coraza
      dockerfile: Dockerfile
    environment:
      - WAF_CONFIG_FILE=${WAF_CONFIG_FILE:-conf/config.json}
    volumes:
      - ./data/db:/app/db
      - ./data/audit:/app/audit
      - ./data/cache:/app/cache
      - ./data/conf:/app/conf:ro
      - ./data/php-fpm:/app/data/php-fpm
      - ./data/vhosts:/app/data/vhosts:ro
    ports:
      - "${CORAZA_PORT:-19094}:${WAF_LISTEN_PORT:-9090}"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -T 2 -O /dev/null http://127.0.0.1:${WAF_LISTEN_PORT:-9090}/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped
