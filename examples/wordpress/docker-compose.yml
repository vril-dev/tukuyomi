services:
  db:
    image: mariadb:11.4
    environment:
      - MARIADB_DATABASE=wordpress
      - MARIADB_USER=wordpress
      - MARIADB_PASSWORD=wordpress
      - MARIADB_ROOT_PASSWORD=changeme-root-password
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

  wordpress:
    image: wordpress:php8.2-apache
    environment:
      - WORDPRESS_DB_HOST=db:3306
      - WORDPRESS_DB_NAME=wordpress
      - WORDPRESS_DB_USER=wordpress
      - WORDPRESS_DB_PASSWORD=wordpress
    depends_on:
      - db
    restart: unless-stopped

  coraza:
    user: "${PUID}:${GUID}"
    build:
      context: ../../coraza
      dockerfile: Dockerfile
    environment:
      - WAF_CONFIG_FILE=${WAF_CONFIG_FILE:-conf/config.json}
    volumes:
      - ./data/rules:/app/rules
      - ./data/conf:/app/conf
      - ./data/logs:/app/logs
    ports:
      - "${CORAZA_PORT:-19092}:${WAF_LISTEN_PORT:-9090}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -T 2 -O /dev/null http://127.0.0.1:${WAF_LISTEN_PORT:-9090}/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    depends_on:
      - wordpress
    restart: unless-stopped

volumes:
  db_data:
