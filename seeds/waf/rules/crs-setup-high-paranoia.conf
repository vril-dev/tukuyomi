# CRS setup override for WordPress high-paranoia profile.
# Load the full default CRS setup first to initialize all required tx variables.
Include crs/crs-setup.conf

# Raise paranoia and tighten anomaly thresholds for this profile.
SecAction "id:1090000,phase:1,pass,t:none,nolog,setvar:tx.blocking_paranoia_level=2"
SecAction "id:1090001,phase:1,pass,t:none,nolog,setvar:tx.detection_paranoia_level=2"
SecAction "id:1090002,phase:1,pass,t:none,nolog,setvar:tx.inbound_anomaly_score_threshold=5,setvar:tx.outbound_anomaly_score_threshold=4"
