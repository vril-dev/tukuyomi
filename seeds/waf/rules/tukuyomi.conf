# tukuyomi baseline rules
# This baseline is imported into DB-backed WAF rule assets.

SecRuleEngine On
SecRequestBodyAccess On
SecResponseBodyAccess Off

# Allow common methods only.
SecRule REQUEST_METHOD "!@rx ^(?:GET|HEAD|POST|PUT|PATCH|DELETE|OPTIONS)$" "id:100001,phase:1,deny,status:405,log,msg:'Unsupported HTTP method'"

# Block sensitive path probing.
SecRule REQUEST_URI "@rx (?i)(?:^|/)(?:\\.git|\\.env)(?:/|$)|(?:wp-login\\.php|xmlrpc\\.php)$" "id:100002,phase:1,deny,status:403,log,msg:'Sensitive path probing detected'"

# Block basic path traversal patterns.
SecRule REQUEST_URI|ARGS|ARGS_NAMES "@rx (?i)(?:\\.\\./|\\.\\.\\\\|%2e%2e%2f|%2e%2e%5c)" "id:100003,phase:2,deny,status:403,log,msg:'Path traversal pattern detected'"

# libinjection-based SQLi and XSS detection.
SecRule ARGS|REQUEST_HEADERS|REQUEST_URI "@detectSQLi" "id:100004,phase:2,deny,status:403,log,msg:'SQLi pattern detected'"
SecRule ARGS|REQUEST_HEADERS|REQUEST_URI "@detectXSS" "id:100005,phase:2,deny,status:403,log,msg:'XSS pattern detected'"

# Explicit patterns as deterministic fallback.
SecRule REQUEST_URI|ARGS|ARGS_NAMES "@rx (?i)(?:<script\\b|javascript:|onerror\\s*=|onload\\s*=)" "id:100006,phase:2,deny,status:403,log,msg:'XSS payload pattern detected'"
SecRule REQUEST_URI|ARGS|ARGS_NAMES "@rx (?i)(?:\\bunion\\b\\s+\\bselect\\b|\\bor\\b\\s+[0-9]+\\s*=\\s*[0-9]+|\\bselect\\b\\s+.+\\bfrom\\b)" "id:100007,phase:2,deny,status:403,log,msg:'SQLi payload pattern detected'"
