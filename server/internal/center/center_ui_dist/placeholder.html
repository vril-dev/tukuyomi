<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <base href="__CENTER_UI_BASE_HREF__" />
    <title>Tukuyomi Center UI placeholder</title>
    <script id="center-settings" type="application/json">__CENTER_SETTINGS__</script>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", system-ui, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #0f172a;
      }
      main {
        width: min(42rem, calc(100vw - 2rem));
        border: 1px solid #e5e7eb;
        border-radius: 1rem;
        padding: 2rem;
        background: #ffffff;
        box-shadow: 0 16px 50px rgba(15, 23, 42, 0.08);
      }
      code {
        font-family: "SFMono-Regular", Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Tukuyomi Center UI not built</h1>
      <p>
        Run <code>make center-ui-build-sync</code> or <code>make build</code>
        before packaging <code>tukuyomi</code>.
      </p>
    </main>
  </body>
</html>
